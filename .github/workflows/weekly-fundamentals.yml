name: Bi-Weekly Fundamentals Update

on:
  schedule:
    # Runs at 02:00 UTC every Wednesday (Day 3) and Saturday (Day 6)
    - cron: '0 2 * * 3,6'
  workflow_dispatch: 
    inputs:
      chunk:
        description: 'Manual Trigger: Which chunk to run? (0 for first 250, 1 for next 250)'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

permissions:
  contents: write 

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Determine Target Chunk
        id: set_chunk
        run: |
          # If triggered manually, use the dropdown input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "CHUNK_INDEX=${{ github.event.inputs.chunk }}" >> $GITHUB_ENV
          else
            # If scheduled, check the day. Wednesday=3, Saturday=6
            DAY=$(date +%u) 
            if [ "$DAY" -eq 3 ]; then
              echo "CHUNK_INDEX=0" >> $GITHUB_ENV
            else
              echo "CHUNK_INDEX=1" >> $GITHUB_ENV
            fi
          fi

      - name: Run Fundamental Data Script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }} # MUST add this to your Repo Secrets!
        run: python update_fundamentals.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f nifty500_fundamentals.csv ]; then
            git add nifty500_fundamentals.csv
            
            if ! git diff --staged --quiet; then
              git commit -m "Automated update: Fundamentals Chunk $CHUNK_INDEX"
              git pull origin main --rebase -X theirs
              git push origin main
            else
              echo "No changes in nifty500_fundamentals.csv to commit."
            fi
          else
            echo "nifty500_fundamentals.csv was not generated. Skipping commit."
          fi
