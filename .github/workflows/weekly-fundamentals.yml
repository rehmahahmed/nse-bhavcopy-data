name: Weekly Nifty 750 Fundamentals

on:
  schedule:
    # Runs at 02:00 UTC every Saturday
    - cron: '0 2 * * 6'
  workflow_dispatch: # Allows you to trigger it manually anytime

permissions:
  contents: write 

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for rebase logic

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance

      - name: Run Fundamental Data Script
        run: python update_fundamentals.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          FILE="nifty750_fundamentals.csv"
          
          if [ -f "$FILE" ]; then
            git add "$FILE"
            
            if ! git diff --staged --quiet; then
              git commit -m "Automated update: Nifty 750 Fundamentals via yfinance"
              
              git stash # Safety mechanism
              
              git pull origin main --rebase -X theirs || git pull origin master --rebase -X theirs
              
              git push origin main || git push origin master
            else
              echo "No changes in $FILE to commit."
            fi
          else
            echo "$FILE was not generated. Skipping commit."
          fi
