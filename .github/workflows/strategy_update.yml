name: Daily Strategy Backtest & Allocations

on:
  schedule:
    # Runs at 08:17 AM UTC, which is exactly 9.30 am IST, Monday through Friday
    - cron: '00 04 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pandas_ta yfinance pytz
          
      - name: Run EOD Strategy Script
        run: python run_strategy.py

      - name: Commit and Push CSVs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the 3 specific files the script generates
          git add daily_allocations.csv historical_portfolio_value.csv strategy_trade_history.csv || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Automated Strategy Update"
            git pull origin main --rebase -X theirs || git pull origin master --rebase -X theirs
            git push origin main || git push origin master
          else
            echo "No changes to commit."
          fi
