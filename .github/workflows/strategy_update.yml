name: Daily Strategy Backtest & Allocations

on:
  schedule:
    # Runs at 09:30 AM UTC, which is exactly 3:00 PM IST, Monday through Friday
    - cron: '30 09 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pandas_ta yfinance pytz pyotp smartapi-python logzero websocket-client
          
      - name: Run EOD Strategy Script
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python run_strategy.py

      - name: Commit and Push CSVs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the generated files
          git add daily_allocations.csv historical_portfolio_value.csv || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Automated Strategy Update (3:00 PM Execution)"
            git pull origin main --rebase -X theirs || git pull origin master --rebase -X theirs
            git push origin main || git push origin master
          else
            echo "No changes to commit."
          fi
