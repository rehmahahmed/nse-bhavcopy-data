name: Daily Strategy Backtest & Allocations

on:
  schedule:
    # RUN 1: Execution Phase -> 04:00 UTC = 9:30 AM IST (Monday-Friday)
    - cron: '00 04 * * 1-5'
    
    # RUN 2: Calculation Phase -> 10:30 UTC = 4:00 PM IST (Monday-Friday)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 💥 FIX: Forces Git to pull the full history so it doesn't get confused by deleted files

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pandas_ta yfinance pytz
          
      - name: Run EOD Strategy Script
        run: python run_strategy.py

      - name: Commit and Push CSVs
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the 3 specific files the script generates
          git add daily_allocations.csv historical_portfolio_value.csv strategy_trade_history.csv
          
          # Check if there are actual changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Automated Strategy Update"
            
            # Stash any leftover trash files so the pull doesn't crash
            git stash
            
            # Safely pull and push
            git pull origin main --rebase || git pull origin master --rebase
            git push origin main || git push origin master
          else
            echo "No changes to commit."
          fi
