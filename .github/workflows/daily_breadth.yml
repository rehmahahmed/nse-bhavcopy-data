name: Daily 5-Year Market Breadth

on:
  schedule:
    # Runs at 12:30 PM UTC, which is exactly 6:00 PM IST, Monday-Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # Allows you to click "Run workflow" manually

permissions:
  contents: write 

jobs:
  run-breadth-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas smartapi-python pyotp numpy websocket logzero

      - name: Run Market Breadth Script
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        # Update this filename if you fix the typo in your repo!
        run: python market_breadtj.py

      - name: Commit and Push Updated CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add market_breadth_history_5yr.csv
          git commit -m "Automated daily breadth update" || echo "No changes to commit"
          git push
