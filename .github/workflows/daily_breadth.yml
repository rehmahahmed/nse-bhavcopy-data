name: Daily 5-Year Market Breadth

on:
  schedule:
    # Runs at 12:30 PM UTC, which is exactly 6:00 PM IST, Monday-Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # Allows you to click "Run workflow" manually

permissions:
  contents: write 

jobs:
  run-breadth-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetches all history so the rebase command has the context it needs
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas smartapi-python pyotp numpy websocket logzero

      - name: Run Market Breadth Script
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python market_breadth.py

      - name: Commit and Push Updated CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f market_breadth_history_5yr.csv ]; then
            # 1. Stage our new CSV data
            git add market_breadth_history_5yr.csv
            
            # 2. Commit the data FIRST
            git commit -m "Automated daily breadth update" || echo "No changes to commit"
            
            # 3. Stash any random leftover files (like logs or pycache) so Git doesn't panic
            git stash
            
            # 4. Pull the latest repo changes safely
            git pull origin main --rebase || git pull origin master --rebase
            
            # 5. Push our completed commit to the repo
            git push origin main || git push origin master
          else
            echo "CSV file was not found! The Python script likely failed. Skipping commit."
          fi
