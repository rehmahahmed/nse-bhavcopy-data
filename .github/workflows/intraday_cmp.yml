name: Live Market Price Update to Power BI

on:
  schedule:
    # Runs every 5 minutes from Monday to Friday
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: 

jobs:
  update-live-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # Added requests library for the Power BI API
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python requests

      - name: Run Live Script & Push to Power BI
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          POWER_BI_PUSH_URL: ${{ secrets.POWER_BI_PUSH_URL }}
        run: python update_live_csv.py
