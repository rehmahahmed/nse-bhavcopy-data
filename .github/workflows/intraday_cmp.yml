name: 45-Min Market Price Update

on:
  schedule:
    # Custom hourly intervals during Indian Market Hours (Converted to UTC)
    - cron: '45 2 * * 1-5'  # 08:15 AM IST
    - cron: '30 3 * * 1-5'  # 09:00 AM IST
    - cron: '45 4 * * 1-5'  # 10:15 AM IST
    - cron: '45 5 * * 1-5'  # 11:15 AM IST
    - cron: '45 6 * * 1-5'  # 12:15 PM IST
    - cron: '45 7 * * 1-5'  # 01:15 PM IST
    - cron: '45 8 * * 1-5'  # 02:15 PM IST
    - cron: '45 9 * * 1-5'  # 03:15 PM IST
  workflow_dispatch: # Allows you to trigger it manually if needed

jobs:
  update-live-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for better performance and node versioning

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python logzero websocket-client

      - name: Run Script to generate CSV
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python update_live_csv.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage BOTH the dashboard AND the background database!
          git add daily_rs_data.csv
          git add historical_db.csv
          
          if ! git diff --staged --quiet; then
            git commit -m "Automated daily RS update"
            git stash
            git pull origin main --rebase -X theirs || git pull origin master --rebase -X theirs
            git push origin main || git push origin master
          else
            echo "No changes to commit."
          fi
