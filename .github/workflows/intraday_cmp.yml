name: 10-Min Live Market Price Update

on:
  schedule:
    # 03:45 UTC = 09:15 AM IST (Market Open)
    # 03:55 UTC = 09:25 AM IST
    - cron: '45,55 3 * * 1-5'
    
    # 04:00 to 09:59 UTC = 09:30 AM to 03:25 PM IST
    # Runs every 10 minutes at 5, 15, 25, 35, 45, 55 past the hour
    - cron: '5,15,25,35,45,55 4-9 * * 1-5'
    
    # 10:05 UTC = 03:35 PM IST (Final closing tick)
    - cron: '5 10 * * 1-5'
    
  workflow_dispatch:

jobs:
  update-live-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python logzero websocket-client numpy

      - name: Run Live CMP Script
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: |
          python update_live_csv.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the live CMP file
          if [ -f live_cmp.csv ]; then
            git add live_cmp.csv
          fi
          
          if ! git diff --staged --quiet; then
            git commit -m "Automated Live CMP update"
            git stash
            git pull origin main --rebase -X theirs || git pull origin master --rebase -X theirs
            git push origin main || git push origin master
          else
            echo "No changes to commit."
          fi
