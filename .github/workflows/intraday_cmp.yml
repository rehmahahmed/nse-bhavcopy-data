name: 45-Min Market Price Update

on:
  schedule:
    # Hourly intervals during Indian Market Hours + Final run (Converted to UTC)
    - cron: '45 3 * * 1-5'  # 09:15 AM IST
    - cron: '45 4 * * 1-5'  # 10:15 AM IST
    - cron: '45 5 * * 1-5'  # 11:15 AM IST
    - cron: '45 6 * * 1-5'  # 12:15 PM IST
    - cron: '45 7 * * 1-5'  # 01:15 PM IST
    - cron: '45 8 * * 1-5'  # 02:15 PM IST
    - cron: '45 9 * * 1-5'  # 03:15 PM IST
    - cron: '10 10 * * 1-5' # 03:40 PM IST
  workflow_dispatch: 

jobs:
  update-live-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for better performance and node versioning

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python logzero websocket-client

      - name: Run Script to generate CSV
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python update_live_csv.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f live_cmp.csv ]; then
            # 1. ADD the new file first so Git knows it is safe
            git add live_cmp.csv
            
            # 2. CHECK for changes and COMMIT
            if ! git diff --staged --quiet; then
              git commit -m "Automated 45-min live_cmp.csv update"
              
              # 3. PULL background changes smoothly using rebase
              # '-X theirs' auto-resolves conflicts by prioritizing your newly generated local file
              git pull origin main --rebase -X theirs
              
              # 4. PUSH to your repo
              git push origin main
            else
              echo "No changes in live_cmp.csv to commit."
            fi
          else
            echo "live_cmp.csv was not generated. Skipping commit."
          fi
