name: Daily Angel RS Fetcher

on:
  schedule:
    # Runs at 11:30 AM UTC, which is 5:00 PM IST, Monday through Friday
    - cron: '30 11 * * 1-5'
  workflow_dispatch: 
    # This allows you to run the script manually by clicking a button in GitHub

permissions:
  contents: write # Crucial: Allows the bot to save the CSV back to your repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # <-- Change this from 3.10 to 3.11

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyotp smartapi-python numpy requests logzero websocket-client yfinance pandas-ta

      - name: Run Angel Data Fetch and RS Calculation
        env:
          # This is where GitHub pulls your secrets out of the vault
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python update_angel_data.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f daily_rs_data.csv ]; then
            # 1. ADD the new file
            git add daily_rs_data.csv
            
            # 2. CHECK for changes and COMMIT
            if ! git diff --staged --quiet; then
              git commit -m "Automated daily RS update"
              
              # 3. PULL background changes smoothly using rebase
              # '-X theirs' prioritizes your newly generated local file if there's a conflict
              git pull origin main --rebase -X theirs
              
              # 4. PUSH to your repo
              git push origin main
            else
              echo "No changes in daily_rs_data.csv to commit."
            fi
          else
            echo "daily_rs_data.csv was not generated. Skipping commit."
          fi
