name: Daily Angel RS Fetcher

on:
  schedule:
    # Runs at 11:30 AM UTC, which is 5:00 PM IST, Monday through Friday
    - cron: '30 11 * * 1-5'
  workflow_dispatch: 
    # This allows you to run the script manually by clicking a button in GitHub

permissions:
  contents: write # Crucial: Allows the bot to save the CSV back to your repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas pyotp SmartApi-python numpy requests logzero websocket-client

      - name: Run Angel Data Fetch and RS Calculation
        env:
          # This is where GitHub pulls your secrets out of the vault
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python update_angel_data.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_rs_data.csv
          git commit -m "Automated daily RS update" || echo "No new data to commit"
          git push
