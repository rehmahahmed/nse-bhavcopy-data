name: Daily Angel RS Fetcher

on:
  schedule:
    - cron: '30 11 * * 1-5' # Runs at 11:30 UTC -> 5:00 PM IST on Weekdays
  workflow_dispatch: # Allows you to click a "Run" button manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas pyotp SmartApi-python numpy requests

      - name: Run Angel Data Fetch and RS Calculation
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python update_angel_data.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add daily_rs_data.csv
          git commit -m "Automated RS update" || echo "No changes to commit"
          git push
